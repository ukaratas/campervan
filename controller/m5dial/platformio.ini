; M5Dial cross-platform UI — default: desktop simulator (LVGL + SDL2)
[platformio]
default_envs = native

[env:native]
platform = native
build_src_filter =
  +<*>
  -<hardware/m5dial_adapter.cpp>
build_flags =
  -std=c++17
  -Wall
  -Wextra
  -O2
  -DPLATFORM_NATIVE=1
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_LVGL_H_INCLUDE_SIMPLE
  -D LV_COLOR_DEPTH=32
  -I include
  -I src
lib_deps =
  lvgl/lvgl@8.3.11
extra_scripts =
  pre:scripts/pio_sdl2_flags.py

; ESP32-S3 M5Dial — placeholder (Arduino + M5Unified + LVGL); build when hardware is ready
[env:m5dial]
platform = espressif32
board = m5stack-stamps3
framework = arduino
build_flags =
  -std=c++17
  -DARDUINO_USB_CDC_ON_BOOT=1
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_LVGL_H_INCLUDE_SIMPLE
  -D LV_COLOR_DEPTH=16
  -I include
  -I src
lib_deps =
  lvgl/lvgl@8.3.11
  M5Unified@^0.2.11
build_src_filter =
  +<*>
  -<platform/native/>
  -<hardware/sim_adapter.cpp>
