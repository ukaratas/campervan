# ==========================================
# Push Button Press Detection Automations
# ==========================================
# Bu dosyayı configuration.yaml'a dahil et:
# automation: !include_dir_merge_list automations/

# ===================
# DI0: SAĞ YATAK
# ===================
- id: sag_yatak_button_pressed
  alias: "Sağ Yatak - Buton Basıldı"
  trigger:
    - platform: state
      entity_id: binary_sensor.sag_yatak_butonu
      to: "on"
  action:
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.sag_yatak_press_time
      data:
        datetime: "{{ now().isoformat() }}"

- id: sag_yatak_button_released
  alias: "Sağ Yatak - Buton Bırakıldı"
  trigger:
    - platform: state
      entity_id: binary_sensor.sag_yatak_butonu
      to: "off"
  action:
    - variables:
        press_duration: >
          {{ as_timestamp(now()) - as_timestamp(states('input_datetime.sag_yatak_press_time')) }}
        is_long: "{{ press_duration > 0.8 }}"
        
    # Long press algılandı mı?
    - if:
        - condition: template
          value_template: "{{ is_long }}"
      then:
        # LONG PRESS - Sağ okuma lambası
        - event: sag_yatak_long_press
          event_data: {}
        - service: input_number.set_value
          target:
            entity_id: input_number.sag_yatak_press_count
          data:
            value: 0
      else:
        # Short press - double bekle
        - service: input_number.increment
          target:
            entity_id: input_number.sag_yatak_press_count
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.sag_yatak_waiting_double
        - delay:
            milliseconds: 400
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.sag_yatak_waiting_double
        
        # Timeout sonrası press sayısına bak
        - if:
            - condition: template
              value_template: "{{ states('input_number.sag_yatak_press_count') | int >= 2 }}"
          then:
            # DOUBLE PRESS - Tüm aydınlatma kapat
            - event: sag_yatak_double_press
              event_data: {}
          else:
            # SHORT PRESS - Yatak alanı aç/kapa
            - event: sag_yatak_short_press
              event_data: {}
        
        # Counter'ı sıfırla
        - service: input_number.set_value
          target:
            entity_id: input_number.sag_yatak_press_count
          data:
            value: 0

