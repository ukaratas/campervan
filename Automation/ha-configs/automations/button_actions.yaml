# ===================
# POPUP YATAK BUTON
# ===================
- id: popup_yatak_short_press_action
  alias: "Popup Yatak - Short Press Action"
  trigger:
    - platform: event
      event_type: popup_yatak_short_press
  action:
    - service: light.toggle
      target:
        entity_id: light.popup_yatak_isik

- id: popup_yatak_long_press_action
  alias: "Popup Yatak - Long Press Action"
  trigger:
    - platform: event
      event_type: popup_yatak_long_press
  action:
    # Popup ambiyans - örnek: %30 parlaklık
    - service: light.turn_on
      target:
        entity_id: light.popup_yatak_isik
      data:
        brightness_pct: 30

- id: popup_yatak_double_press_action
  alias: "Popup Yatak - Double Press Action"
  trigger:
    - platform: event
      event_type: popup_yatak_double_press
  action:
    - service: light.turn_off
      target:
        entity_id: all

