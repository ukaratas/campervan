# ==========================================
# Push Button Actions
# ==========================================
# Event trigger'lara göre gerçek aksiyonlar
# Kendi light entity'lerinize göre düzenleyin

# ===================
# SAĞ YATAK BUTON
# ===================
- id: sag_yatak_short_press_action
  alias: "Sağ Yatak - Short Press Action"
  trigger:
    - platform: event
      event_type: sag_yatak_short_press
  action:
    - service: light.toggle
      target:
        entity_id: light.yatak_alani_isik

- id: sag_yatak_long_press_action
  alias: "Sağ Yatak - Long Press Action"
  trigger:
    - platform: event
      event_type: sag_yatak_long_press
  action:
    - service: light.toggle
      target:
        entity_id: light.sag_okuma_isik

- id: sag_yatak_double_press_action
  alias: "Sağ Yatak - Double Press Action"
  trigger:
    - platform: event
      event_type: sag_yatak_double_press
  action:
    - service: light.turn_off
      target:
        entity_id: all

