# ==========================================
# 🚐 KARAVAN - ANA DASHBOARD
# ==========================================
# Bu dashboard karavan için ana kontrol merkezidir
# 5 farklı view (tab) içerir

title: 🚐 Karavan
views:
  # ==========================================
  # VIEW 1: GENEL BAKIŞ
  # ==========================================
  - title: Genel Bakış
    path: genel
    icon: mdi:home
    badges: []
    cards:
      # Hızlı Erişim - Sık Kullanılanlar
      - type: entities
        title: ⚡ Hızlı Erişim
        show_header_toggle: false
        entities:
          - entity: light.mutfak_isik
            name: Mutfak
            icon: mdi:chef-hat
          - entity: light.orta_alan_isik
            name: Orta Alan
            icon: mdi:sofa
          - entity: light.yatak_alani_isik
            name: Yatak Alanı
            icon: mdi:bed
          - entity: switch.induksiyon_ocak
            name: İndüksiyon Ocak
          - entity: switch.buzdolabi
            name: Buzdolabı
          - type: divider
          - entity: switch.temiz_su_hidrofor
            name: Su Pompası
          - entity: switch.truma_combi_d4
            name: Truma Combi

      # Sistem Durumu
      - type: glance
        title: 📊 Sistem Durumu
        columns: 4
        show_name: true
        show_state: true
        entities:
          - entity: switch.buzdolabi
            name: Buzdolabı
            icon: mdi:fridge
          - entity: switch.induksiyon_ocak
            name: Ocak
          - entity: switch.temiz_su_hidrofor
            name: Su Pompası
          - entity: switch.truma_combi_d4
            name: Isıtma

      # Aydınlatma Özeti
      - type: light
        entity: light.mutfak_isik
        name: Mutfak Işık
      
      - type: light
        entity: light.orta_alan_isik
        name: Orta Alan Işık

      # 220V Cihazlar Özeti
      - type: entities
        title: 🔌 220V Cihazlar
        show_header_toggle: false
        entities:
          - entity: switch.induksiyon_ocak
            name: İndüksiyon Ocak (1800W)
            secondary_info: last-changed
          - entity: switch.bulasik_makinesi
            name: Bulaşık Makinesi (1800W)
            secondary_info: last-changed
          - entity: switch.camasir_makinesi
            name: Çamaşır Makinesi (160W)
            secondary_info: last-changed

  # ==========================================
  # VIEW 2: AYDINLATMA
  # ==========================================
  - title: Aydınlatma
    path: aydinlatma
    icon: mdi:lightbulb-group
    badges: []
    cards:
      # Tüm Işıkları Kontrol
      - type: horizontal-stack
        cards:
          - type: button
            name: Tümünü Aç
            icon: mdi:lightbulb-on
            tap_action:
              action: call-service
              service: light.turn_on
              target:
                entity_id: all
            show_name: true
            show_icon: true
          - type: button
            name: Tümünü Kapat
            icon: mdi:lightbulb-off
            tap_action:
              action: call-service
              service: light.turn_off
              target:
                entity_id: all
            show_name: true
            show_icon: true

      # Mutfak Aydınlatma
      - type: entities
        title: 🍳 Mutfak
        show_header_toggle: false
        entities:
          - entity: light.mutfak_isik
            name: Ana Işık
            icon: mdi:ceiling-light
          - entity: light.mutfak_tezgah_isik
            name: Tezgâh Işık
            icon: mdi:led-strip-variant

      # Yaşam Alanı
      - type: entities
        title: 🛋️ Yaşam Alanı
        show_header_toggle: false
        entities:
          - entity: light.orta_alan_isik
            name: Orta Alan Işık
            icon: mdi:floor-lamp
          - entity: light.tente_isik
            name: Tente Işık
            icon: mdi:outdoor-lamp

      # Yatak Alanları
      - type: entities
        title: 🛏️ Yatak Alanları
        show_header_toggle: false
        entities:
          - entity: light.yatak_alani_isik
            name: Yatak Alanı Ana
            icon: mdi:bed-double
          - entity: light.popup_yatak_isik
            name: Popup Yatak
            icon: mdi:bed-single
          - entity: light.sol_okuma_isik
            name: Sol Okuma Işık
            icon: mdi:book-open-page-variant
          - entity: light.sag_okuma_isik
            name: Sağ Okuma Işık
            icon: mdi:book-open-page-variant

      # Banyo
      - type: entities
        title: 🚿 Banyo
        show_header_toggle: false
        entities:
          - entity: light.banyo_aydinlatma
            name: Ana Işık
            icon: mdi:shower
          - entity: light.banyo_ayna_aydinlatma
            name: Ayna Işık
            icon: mdi:mirror

  # ==========================================
  # VIEW 3: 220V CİHAZLAR
  # ==========================================
  - title: 220V Cihazlar
    path: 220v
    icon: mdi:power-plug
    badges: []
    cards:
      # Mutfak Cihazları
      - type: entities
        title: 🍳 Mutfak Cihazları
        show_header_toggle: false
        entities:
          - entity: switch.induksiyon_ocak
            name: İndüksiyon Ocak
            secondary_info: last-changed
            icon: mdi:stove
          - entity: binary_sensor.induksiyon_ocak_status
            name: Ocak Status
            icon: mdi:information
          - type: divider
          - entity: switch.bulasik_makinesi
            name: Bulaşık Makinesi
            secondary_info: last-changed
            icon: mdi:dishwasher
          - entity: binary_sensor.bulasik_makinesi_status
            name: Bulaşık Mak. Status
            icon: mdi:information

      # Beyaz Eşya
      - type: entities
        title: 👕 Beyaz Eşya
        show_header_toggle: false
        entities:
          - entity: switch.camasir_makinesi
            name: Çamaşır Makinesi (FİX Mini 160W)
            secondary_info: last-changed
            icon: mdi:washing-machine
          - entity: binary_sensor.camasir_makinesi_status
            name: Çamaşır Mak. Status
            icon: mdi:information

      # Güç Tüketim Uyarısı
      - type: markdown
        content: |
          ### ⚠️ Güç Tüketim Bilgisi
          
          **Yüksek Güç Tüketimi:**
          - 🔥 İndüksiyon Ocak: **1800W**
          - 🧼 Bulaşık Makinesi: **1200-1800W**
          
          **Düşük Güç Tüketimi:**
          - 👕 Çamaşır Makinesi: **160W** (maks)
          
          ⚡ **Not:** İndüksiyon ve Bulaşık makinesini aynı anda çalıştırmayın!

  # ==========================================
  # VIEW 4: SU SİSTEMİ
  # ==========================================
  - title: Su Sistemi
    path: su
    icon: mdi:water
    badges: []
    cards:
      # Su Pompaları
      - type: entities
        title: 💧 Pompalar
        show_header_toggle: false
        entities:
          - entity: switch.temiz_su_hidrofor
            name: Temiz Su Hidrofor (84W)
            secondary_info: last-changed
            icon: mdi:water-pump
          - entity: switch.macerator_pompa
            name: Macerator Pompa (192W)
            secondary_info: last-changed
            icon: mdi:pump
          - entity: switch.gri_su_pompasi
            name: Gri Su Pompası (120W)
            secondary_info: last-changed
            icon: mdi:water-pump

      # Su Sistemi Bilgi
      - type: markdown
        content: |
          ### 💧 Su Sistemi Bilgisi
          
          **Temiz Su:**
          - Hidrofor pompası otomatik çalışır
          - Basınç tankı ile sabit su basıncı
          
          **Atık Su:**
          - Macerator: WC atık suyu
          - Gri su: Lavabo/duş atık suyu
          
          💡 **İpucu:** Pompaları sadece gerektiğinde çalıştırın.

  # ==========================================
  # VIEW 5: KONFOR & DİĞER
  # ==========================================
  - title: Konfor
    path: konfor
    icon: mdi:air-conditioner
    badges: []
    cards:
      # Isıtma & Soğutma
      - type: entities
        title: 🌡️ Isıtma & Soğutma
        show_header_toggle: false
        entities:
          - entity: switch.truma_combi_d4
            name: Truma Combi D4 (50W)
            secondary_info: last-changed
            icon: mdi:radiator
          - entity: switch.buzdolabi
            name: Buzdolabı (65W)
            secondary_info: last-changed
            icon: mdi:fridge

      # USB Şarj İstasyonları
      - type: entities
        title: 🔌 USB Şarj İstasyonları
        show_header_toggle: false
        entities:
          - entity: switch.usb_kutusu_mutfak
            name: USB Kutusu - Mutfak (200W)
            secondary_info: last-changed
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_yatak
            name: USB Kutusu - Yatak (200W)
            secondary_info: last-changed
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_banyo
            name: USB Kutusu - Banyo (200W)
            secondary_info: last-changed
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_popup
            name: USB Kutusu - Popup (200W)
            secondary_info: last-changed
            icon: mdi:usb-port

      # Genel Bilgi
      - type: markdown
        content: |
          ### 🔋 Enerji Tasarrufu İpuçları
          
          1. 💡 Kullanmadığınız ışıkları kapatın
          2. 🔌 USB kutularını gerektiğinde açın
          3. ❄️ Buzdolabı kapısını uzun süre açık bırakmayın
          4. 🔥 220V cihazları aynı anda çalıştırmayın
          5. 💧 Su pompalarını gereksiz çalıştırmayın


