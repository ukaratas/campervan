title: Karavan Kontrol Paneli
views:
  # ==========================================
  # TAB 1: ANA KONTROL
  # ==========================================
  - title: Ana Kontrol
    path: ana
    icon: mdi:home
    cards:
      # Aydınlatma - Tüm Işıklar
      - type: entities
        title: 🔆 Aydınlatma
        show_header_toggle: true
        entities:
          - entity: light.mutfak_isik
            name: Mutfak Işık
          - entity: light.mutfak_tezgah_isik
            name: Mutfak Tezgâh
          - entity: light.orta_alan_isik
            name: Orta Alan
          - entity: light.yatak_alani_isik
            name: Yatak Alanı
          - entity: light.popup_yatak_isik
            name: Popup Yatak
          - entity: light.sol_okuma_isik
            name: Sol Okuma
          - entity: light.sag_okuma_isik
            name: Sağ Okuma
          - entity: light.tente_isik
            name: Tente Işık
          - entity: light.banyo_aydinlatma
            name: Banyo Aydınlatma
          - entity: light.banyo_ayna_aydinlatma
            name: Banyo Ayna
      
      # 220V Cihazlar
      - type: entities
        title: ⚡ 220V Cihazlar
        entities:
          - entity: switch.induksiyon_ocak
            name: İndüksiyon Ocak
            icon: mdi:stove
          - entity: switch.bulasik_makinesi
            name: Bulaşık Makinesi
            icon: mdi:dishwasher
          - entity: switch.camasir_makinesi
            name: Çamaşır Makinesi
            icon: mdi:washing-machine
          - type: divider
          - entity: binary_sensor.induksiyon_ocak_status
            name: İndüksiyon Status
          - entity: binary_sensor.bulasik_makinesi_status
            name: Bulaşık Status
          - entity: binary_sensor.camasir_makinesi_status
            name: Çamaşır Status
      
      # Yüksek Tüketim Cihazları
      - type: entities
        title: 🔌 Temel Cihazlar
        entities:
          - entity: switch.buzdolabi
            name: Buzdolabı
            icon: mdi:fridge
          - entity: switch.truma_combi_d4
            name: Truma Combi D4
            icon: mdi:radiator
          - entity: switch.usb_kutusu_mutfak
            name: USB Kutusu - Mutfak
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_yatak
            name: USB Kutusu - Yatak
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_banyo
            name: USB Kutusu - Salon
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_popup
            name: USB Kutusu - Popup
            icon: mdi:usb-port

  # ==========================================
  # TAB 2: SU SİSTEMİ
  # ==========================================
  - title: Su Sistemi
    path: su
    icon: mdi:water
    cards:
      - type: entities
        title: 💧 Su Pompaları
        entities:
          - entity: switch.temiz_su_hidrofor
            name: Temiz Su Hidrofor
            icon: mdi:water-pump
          - entity: switch.gri_su_pompasi
            name: Gri Su Pompası
            icon: mdi:water-pump
          - entity: switch.macerator_pompa
            name: Macerator Pompa
            icon: mdi:water-pump
      
      - type: markdown
        content: >
          **Su Sistemi Bilgileri:**
          
          - Temiz Su Hidrofor: 72-96W (3-4A)
          
          - Gri Su Pompası: 120W (5A)
          
          - Macerator: 192W (8A)

  # ==========================================
  # TAB 3: PUSH BUTTON KONTROL
  # ==========================================
  - title: Butonlar
    path: butonlar
    icon: mdi:gesture-tap-button
    cards:
      - type: entities
        title: 🔘 Push Button Durumu
        show_header_toggle: false
        entities:
          - entity: binary_sensor.sag_yatak_butonu
            name: Sağ Yatak Butonu
          - entity: binary_sensor.sol_yatak_butonu
            name: Sol Yatak Butonu
          - entity: binary_sensor.popup_yatak_butonu
            name: Popup Yatak Butonu
          - entity: binary_sensor.dis_aydinlatma_butonu
            name: Dış Aydınlatma Butonu
          - entity: binary_sensor.otomatik_basamak_butonu
            name: Otomatik Basamak Butonu
          - entity: binary_sensor.mutfak_butonu
            name: Mutfak Butonu
          - entity: binary_sensor.orta_alan_butonu
            name: Orta Alan Butonu
          - entity: binary_sensor.banyo_butonu
            name: Banyo Butonu
      
      - type: markdown
        content: >
          **Buton Tipleri:**
          
          - Short Press: Hızlı basma
          
          - Long Press: 0.8s+ basılı tutma
          
          - Double Press: 2x hızlı basma
          
          
          Automations klasöründe özelleştirebilirsiniz!

  # ==========================================
  # TAB 4: TÜM CİHAZLAR
  # ==========================================
  - title: Tüm Cihazlar
    path: hepsi
    icon: mdi:view-grid
    cards:
      - type: entities
        title: 💡 Relay-01 (Aydınlatma)
        entities:
          - light.mutfak_isik
          - light.mutfak_tezgah_isik
          - light.orta_alan_isik
          - light.yatak_alani_isik
          - light.popup_yatak_isik
          - light.sol_okuma_isik
          - light.sag_okuma_isik
          - light.tente_isik
      
      - type: entities
        title: 🚿 Relay-02 (Banyo & Su)
        entities:
          - light.banyo_aydinlatma
          - light.banyo_ayna_aydinlatma
          - switch.temiz_su_hidrofor
          - switch.macerator_pompa
          - switch.rezerv_5
          - switch.rezerv_6
          - switch.rezerv_7
          - switch.rezerv_8
      
      - type: entities
        title: ⚙️ Relay-03 (Yüksek Tüketim)
        entities:
          - switch.buzdolabi
          - switch.usb_kutusu_mutfak
          - switch.usb_kutusu_yatak
          - switch.usb_kutusu_banyo
          - switch.usb_kutusu_popup
          - switch.truma_combi_d4
          - switch.gri_su_pompasi
          - switch.rezerv_8_yuksek_tuketim
      
      - type: entities
        title: ⚡ DI/DO-02 (220V Finder)
        entities:
          - switch.induksiyon_ocak
          - switch.bulasik_makinesi
          - switch.camasir_makinesi
          - type: divider
          - binary_sensor.induksiyon_ocak_status
          - binary_sensor.bulasik_makinesi_status
          - binary_sensor.camasir_makinesi_status
          - binary_sensor.finder_4_status

  # ==========================================
  # TAB 5: SİSTEM DURUMU
  # ==========================================
  - title: Sistem
    path: sistem
    icon: mdi:information
    cards:
      - type: entities
        title: 📊 Simulatör Bilgileri
        entities:
          - type: attribute
            entity: light.mutfak_isik
            attribute: friendly_name
            name: Relay-01 Status
          - type: attribute
            entity: switch.banyo_aydinlatma
            attribute: friendly_name
            name: Relay-02 Status
          - type: attribute
            entity: switch.buzdolabi
            attribute: friendly_name
            name: Relay-03 Status
      
      - type: markdown
        content: >
          **Simulatör Portları:**
          
          - Relay-01: Port 5023 (Aydınlatma)
          
          - Relay-02: Port 5025 (Banyo & Su)
          
          - Relay-03: Port 5026 (Yüksek Tüketim)
          
          - DI/DO-01: Port 5024 (Push Buttons)
          
          - DI/DO-02: Port 5027 (220V Finder)
          
          
          **Host:** ugurs-macbook-m4-pro.local
      
      - type: entities
        title: 🔧 Rezerv Kanallar
        entities:
          - switch.rezerv_5
          - switch.rezerv_6
          - switch.rezerv_7
          - switch.rezerv_8
          - switch.rezerv_8_yuksek_tuketim

