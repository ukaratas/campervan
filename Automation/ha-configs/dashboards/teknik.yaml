# ==========================================
# 🔧 TEKNİK - DASHBOARD
# ==========================================
# Bu dashboard teknik kontroller ve debug için
# 2 farklı view (tab) içerir

title: 🔧 Teknik
views:
  # ==========================================
  # VIEW 1: MODBUS CİHAZLARI
  # ==========================================
  - title: Modbus Cihazlar
    path: modbus
    icon: mdi:chip
    badges: []
    cards:
      # Latching Relay 01 - Aydınlatma
      - type: entities
        title: 📡 Relay-01 (Port 5023) - Aydınlatma
        show_header_toggle: false
        entities:
          - type: section
            label: "Cihaz Bilgisi"
          - type: attribute
            entity: light.mutfak_isik
            attribute: friendly_name
            name: Tip
            suffix: " Kontrol"
          - type: section
            label: "Röleler (8 Kanal)"
          - entity: light.mutfak_isik
            name: "R0: Mutfak"
          - entity: light.mutfak_tezgah_isik
            name: "R1: Tezgâh"
          - entity: light.orta_alan_isik
            name: "R2: Orta Alan"
          - entity: light.yatak_alani_isik
            name: "R3: Yatak"
          - entity: light.popup_yatak_isik
            name: "R4: Popup"
          - entity: light.sol_okuma_isik
            name: "R5: Sol Okuma"
          - entity: light.sag_okuma_isik
            name: "R6: Sağ Okuma"
          - entity: light.tente_isik
            name: "R7: Tente"

      # DI/DO 01 - Push Buttons
      - type: entities
        title: 📡 DI/DO-01 (Port 5024) - Push Buttons
        show_header_toggle: false
        entities:
          - type: section
            label: "Digital Inputs (8 Push Buttons)"
          - entity: binary_sensor.sag_yatak_butonu
            name: "DI0: Sağ Yatak"
          - entity: binary_sensor.sol_yatak_butonu
            name: "DI1: Sol Yatak"
          - entity: binary_sensor.popup_yatak_butonu
            name: "DI2: Popup Yatak"
          - entity: binary_sensor.dis_aydinlatma_butonu
            name: "DI3: Dış Aydınlatma"
          - entity: binary_sensor.otomatik_basamak_butonu
            name: "DI4: Basamak"
          - entity: binary_sensor.mutfak_butonu
            name: "DI5: Mutfak"
          - entity: binary_sensor.orta_alan_butonu
            name: "DI6: Orta Alan"
          - entity: binary_sensor.banyo_butonu
            name: "DI7: Banyo"

      # Latching Relay 02 - Banyo & Su
      - type: entities
        title: 📡 Relay-02 (Port 5025) - Banyo & Su
        show_header_toggle: false
        entities:
          - type: section
            label: "Röleler (8 Kanal)"
          - entity: light.banyo_aydinlatma
            name: "R0: Banyo"
          - entity: light.banyo_ayna_aydinlatma
            name: "R1: Ayna"
          - entity: switch.temiz_su_hidrofor
            name: "R2: Hidrofor"
          - entity: switch.macerator_pompa
            name: "R3: Macerator"

      # Latching Relay 03 - Yüksek Tüketim
      - type: entities
        title: 📡 Relay-03 (Port 5026) - Yüksek Tüketim
        show_header_toggle: false
        entities:
          - type: section
            label: "Röleler (8 Kanal)"
          - entity: switch.buzdolabi
            name: "R0: Buzdolabı"
          - entity: switch.usb_kutusu_mutfak
            name: "R1: USB Mutfak"
          - entity: switch.usb_kutusu_yatak
            name: "R2: USB Yatak"
          - entity: switch.usb_kutusu_banyo
            name: "R3: USB Banyo"
          - entity: switch.usb_kutusu_popup
            name: "R4: USB Popup"
          - entity: switch.truma_combi_d4
            name: "R5: Truma"
          - entity: switch.gri_su_pompasi
            name: "R6: Gri Su"

      # DI/DO 02 - Finder 220V
      - type: entities
        title: 📡 DI/DO-02 (Port 5027) - Finder 220V Röleler
        show_header_toggle: false
        entities:
          - type: section
            label: "Digital Inputs (Status Feedback)"
          - entity: binary_sensor.induksiyon_ocak_status
            name: "DI0: İndüksiyon Status"
          - entity: binary_sensor.bulasik_makinesi_status
            name: "DI1: Bulaşık Status"
          - entity: binary_sensor.camasir_makinesi_status
            name: "DI2: Çamaşır Status"
          - entity: binary_sensor.finder_4_status
            name: "DI3: Finder-4 Status"
          - type: section
            label: "Digital Outputs (Finder Kontrol)"
          - entity: switch.induksiyon_ocak_set
            name: "DO0: İndüksiyon SET"
          - entity: switch.induksiyon_ocak_reset
            name: "DO1: İndüksiyon RESET"
          - entity: switch.bulasik_makinesi_set
            name: "DO2: Bulaşık SET"
          - entity: switch.bulasik_makinesi_reset
            name: "DO3: Bulaşık RESET"
          - entity: switch.camasir_makinesi_set
            name: "DO4: Çamaşır SET"
          - entity: switch.camasir_makinesi_reset
            name: "DO5: Çamaşır RESET"

  # ==========================================
  # VIEW 2: TEST & DEBUG
  # ==========================================
  - title: Test & Debug
    path: test
    icon: mdi:bug
    badges: []
    cards:
      # Hızlı Test Butonları
      - type: vertical-stack
        cards:
          - type: button
            name: Test - Tüm Işıkları Yanıp Söndür
            icon: mdi:lightbulb-multiple
            tap_action:
              action: call-service
              service: light.toggle
              target:
                entity_id: all
            show_name: true
            show_icon: true
          - type: button
            name: Test - Mutfak Işık Toggle
            icon: mdi:chef-hat
            tap_action:
              action: call-service
              service: light.toggle
              target:
                entity_id: light.mutfak_isik
            show_name: true
            show_icon: true
          - type: button
            name: Test - İndüksiyon AÇ
            icon: mdi:stove
            tap_action:
              action: call-service
              service: switch.turn_on
              target:
                entity_id: switch.induksiyon_ocak
            show_name: true
            show_icon: true
          - type: button
            name: Test - İndüksiyon KAPAT
            icon: mdi:stove-off
            tap_action:
              action: call-service
              service: switch.turn_off
              target:
                entity_id: switch.induksiyon_ocak
            show_name: true
            show_icon: true

      # Manuel Finder Kontrol
      - type: entities
        title: 🔧 Manuel Finder Kontrol
        show_header_toggle: false
        entities:
          - type: section
            label: "İndüksiyon Ocak"
          - entity: switch.induksiyon_ocak_set
            name: "SET (Aç)"
          - entity: switch.induksiyon_ocak_reset
            name: "RESET (Kapat)"
          - entity: binary_sensor.induksiyon_ocak_status
            name: "Status"
          - type: section
            label: "Bulaşık Makinesi"
          - entity: switch.bulasik_makinesi_set
            name: "SET (Aç)"
          - entity: switch.bulasik_makinesi_reset
            name: "RESET (Kapat)"
          - entity: binary_sensor.bulasik_makinesi_status
            name: "Status"
          - type: section
            label: "Çamaşır Makinesi"
          - entity: switch.camasir_makinesi_set
            name: "SET (Aç)"
          - entity: switch.camasir_makinesi_reset
            name: "RESET (Kapat)"
          - entity: binary_sensor.camasir_makinesi_status
            name: "Status"

      # Sistem Bilgisi
      - type: markdown
        content: |
          ### 🔧 Teknik Bilgiler
          
          **Modbus Cihazları:**
          - Relay-01: `192.168.1.79:5023` (Aydınlatma)
          - DI/DO-01: `192.168.1.79:5024` (Push Buttons)
          - Relay-02: `192.168.1.79:5025` (Banyo & Su)
          - Relay-03: `192.168.1.79:5026` (Yüksek Tüketim)
          - DI/DO-02: `192.168.1.79:5027` (Finder 220V)
          
          **Hostname:** `ugurs-macbook-m4-pro.local`
          
          **Finder Röle Mantığı:**
          - SET: DO'yu 100ms aç → kapat (Röle AÇ)
          - RESET: DO'yu 100ms aç → kapat (Röle KAPAT)
          - STATUS: DI'dan gerçek durum okunur
          
          **Button Press Detection:**
          - Short Press: < 0.8s
          - Long Press: > 0.8s
          - Double Press: 2x short + 400ms interval

      # Troubleshooting
      - type: markdown
        content: |
          ### 🐛 Troubleshooting
          
          **Modbus bağlantı hatası:**
          1. Simulator çalışıyor mu kontrol et
          2. `ugurs-macbook-m4-pro.local` erişilebilir mi?
          3. Home Assistant restart dene
          
          **Finder röleler çalışmıyor:**
          1. DI/DO-02 simulator çalışıyor mu?
          2. Template switch'ler yüklendi mi?
          3. Binary sensor status'u değişiyor mu?
          
          **Butonlar çalışmıyor:**
          1. Binary sensor değişiyor mu?
          2. Helper'lar yüklendi mi?
          3. Automations aktif mi?
          
          **Deploy komutu:**
          ```bash
          cd Automation/ha-configs
          python3 deploy.py --auto
          ```


