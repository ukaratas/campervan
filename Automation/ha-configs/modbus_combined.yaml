# ===========================================
# DEVICE 5: DI/DO Module 02 (220V Finder Röle Kontrol)
# ===========================================
- name: "Finder_220V_Kontrol"
  type: tcp
  host: ugurs-macbook-m4-pro.local
  port: 5027
  
  # Digital Inputs (Finder Status Feedback)
  binary_sensors:
    - name: "İndüksiyon Ocak Status"
      unique_id: finder_220v_di_0
      slave: 1
      address: 0
      input_type: discrete_input
      scan_interval: 1
    
    - name: "Bulaşık Makinesi Status"
      unique_id: finder_220v_di_1
      slave: 1
      address: 1
      input_type: discrete_input
      scan_interval: 1
    
    - name: "Çamaşır Makinesi Status"
      unique_id: finder_220v_di_2
      slave: 1
      address: 2
      input_type: discrete_input
      scan_interval: 1
    
    - name: "Finder-4 Status"
      unique_id: finder_220v_di_3
      slave: 1
      address: 3
      input_type: discrete_input
      scan_interval: 1
  
  # Digital Outputs (Finder SET/RESET)
  switches:
    - name: "İndüksiyon Ocak SET"
      unique_id: finder_220v_do_0
      slave: 1
      address: 0
      write_type: coil
      scan_interval: 1
    
    - name: "İndüksiyon Ocak RESET"
      unique_id: finder_220v_do_1
      slave: 1
      address: 1
      write_type: coil
      scan_interval: 1
    
    - name: "Bulaşık Makinesi SET"
      unique_id: finder_220v_do_2
      slave: 1
      address: 2
      write_type: coil
      scan_interval: 1
    
    - name: "Bulaşık Makinesi RESET"
      unique_id: finder_220v_do_3
      slave: 1
      address: 3
      write_type: coil
      scan_interval: 1
    
    - name: "Çamaşır Makinesi SET"
      unique_id: finder_220v_do_4
      slave: 1
      address: 4
      write_type: coil
      scan_interval: 1
    
    - name: "Çamaşır Makinesi RESET"
      unique_id: finder_220v_do_5
      slave: 1
      address: 5
      write_type: coil
      scan_interval: 1
    
    - name: "Finder-4 SET"
      unique_id: finder_220v_do_6
      slave: 1
      address: 6
      write_type: coil
      scan_interval: 1
    
    - name: "Finder-4 RESET"
      unique_id: finder_220v_do_7
      slave: 1
      address: 7
      write_type: coil
      scan_interval: 1

# ==========================================
# Waveshare Modbus RTU Analog Input 8CH
# Home Assistant Konfigürasyonu
# ==========================================
# Port: 5028
# Slave ID: 1
# Host: ugurs-macbook-m4-pro.local (dinamik IP'den bağımsız)

- name: "Analog_Sensorler"
  type: tcp
  host: ugurs-macbook-m4-pro.local
  port: 5028
  
  # Analog Input Sensörleri (Holding Registers - Function Code 03)
  # Değerler 10x ölçeklenmiş olarak gelir (scale: 0.1)
  
  sensors:
    # ==========================================
    # SU SEVİYELERİ (AI0, AI1)
    # ==========================================
    - name: "Temiz Su Seviyesi"
      unique_id: analog_01_sensor_0
      slave: 1
      address: 0
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "%"
      device_class: battery  # Doluluk seviyesi için battery uygun
      state_class: measurement
      scan_interval: 5
    
    - name: "Gri Su Seviyesi"
      unique_id: analog_01_sensor_1
      slave: 1
      address: 1
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      scan_interval: 5
    
    # ==========================================
    # SICAKLIK SENSÖRLERİ (AI2-AI5, AI7)
    # ==========================================
    - name: "Banyo Sıcaklık"
      unique_id: analog_01_sensor_2
      slave: 1
      address: 2
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      scan_interval: 5
    
    - name: "Salon Sıcaklık"
      unique_id: analog_01_sensor_3
      slave: 1
      address: 3
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      scan_interval: 5
    
    - name: "Yatak Sıcaklık"
      unique_id: analog_01_sensor_4
      slave: 1
      address: 4
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      scan_interval: 5
    
    - name: "Elektronik Ortam Sıcaklık"
      unique_id: analog_01_sensor_5
      slave: 1
      address: 5
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      scan_interval: 5
    
    - name: "Dış Sıcaklık"
      unique_id: analog_01_sensor_7
      slave: 1
      address: 7
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      scan_interval: 10  # Dış sıcaklık daha yavaş değişir
    
    # ==========================================
    # HAVA KALİTESİ (AI6)
    # ==========================================
    - name: "Salon CO2 Seviyesi"
      unique_id: analog_01_sensor_6
      slave: 1
      address: 6
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 0
      unit_of_measurement: "ppm"
      device_class: carbon_dioxide
      state_class: measurement
      scan_interval: 5

