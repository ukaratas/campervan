      scan_interval: 1
    
    - name: "USB Kutusu Popup"
      unique_id: relay_03_switch_4
      slave: 1
      address: 4
      write_type: coil
      scan_interval: 1
    
    - name: "Truma Combi D4"
      unique_id: relay_03_switch_5
      slave: 1
      address: 5
      write_type: coil
      scan_interval: 1
    
    - name: "Gri Su Pompası"
      unique_id: relay_03_switch_6
      slave: 1
