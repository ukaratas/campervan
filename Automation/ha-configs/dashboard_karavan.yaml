# ==========================================
# Karavan Dashboard Configuration
# ==========================================
# Bu dosyayı Home Assistant'a yüklemek için:
# 1. Settings → Dashboards → + Add Dashboard
# 2. "Start with an empty dashboard" seç
# 3. Title: "Karavan Kontrol"
# 4. Icon: mdi:camper
# 5. Oluştur
# 6. ⋮ (3 nokta) → Raw configuration editor
# 7. Bu dosyanın içeriğini yapıştır

title: Karavan Kontrol
icon: mdi:rv-truck
views:
  # ==========================================
  # VIEW 1: Aydınlatma & Elektrik
  # ==========================================
  - title: Aydınlatma
    icon: mdi:lightbulb-group
    path: aydinlatma
    badges: []
    cards:
      # Mutfak Kartı
      - type: entities
        title: 🍳 Mutfak
        show_header_toggle: true
        entities:
          - entity: light.mutfak_isik
            name: Mutfak Işık
          - entity: light.mutfak_tezgah_isik
            name: Tezgâh Işık
          - entity: binary_sensor.mutfak_butonu
            name: Mutfak Butonu
      
      # Yatak Alanı Kartı
      - type: entities
        title: 🛏️ Yatak Alanı
        show_header_toggle: true
        entities:
          - entity: light.yatak_alani_isik
            name: Yatak Işık
          - entity: light.sol_okuma_isik
            name: Sol Okuma
          - entity: light.sag_okuma_isik
            name: Sağ Okuma
          - type: divider
          - entity: binary_sensor.sag_yatak_butonu
            name: Sağ Buton
          - entity: binary_sensor.sol_yatak_butonu
            name: Sol Buton
      
      # Orta Alan Kartı
      - type: entities
        title: 🏠 Orta Alan
        show_header_toggle: false
        entities:
          - entity: light.orta_alan_isik
            name: Orta Alan Işık
          - entity: binary_sensor.orta_alan_butonu
            name: Orta Alan Butonu
      
      # Popup Yatak Kartı
      - type: entities
        title: 🚪 Popup Yatak
        show_header_toggle: false
        entities:
          - entity: light.popup_yatak_isik
            name: Popup Işık
          - entity: binary_sensor.popup_yatak_butonu
            name: Popup Butonu
      
      # Dış Alan Kartı
      - type: entities
        title: 🌙 Dış Alan
        show_header_toggle: false
        entities:
          - entity: light.tente_isik
            name: Tente Işık
          - entity: binary_sensor.dis_aydinlatma_butonu
            name: Dış Aydınlatma Butonu
      
      # Banyo Kartı
      - type: entities
        title: 🚿 Banyo
        show_header_toggle: true
        entities:
          - entity: light.banyo_aydinlatma
            name: Banyo Işık
          - entity: light.banyo_ayna_aydinlatma
            name: Ayna Işık
          - entity: binary_sensor.banyo_butonu
            name: Banyo Butonu
      
      # USB Kutuları Kartı
      - type: entities
        title: 🔌 USB Şarj Kutuları
        show_header_toggle: false
        entities:
          - entity: switch.usb_kutusu_mutfak
            name: USB Mutfak (8A)
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_yatak
            name: USB Yatak (8A)
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_banyo
            name: USB Banyo (8A)
            icon: mdi:usb-port
          - entity: switch.usb_kutusu_popup
            name: USB Popup (8A)
            icon: mdi:usb-port
      
      # Tüm Işıklar - Hızlı Kontrol
      - type: light
        entity: light.mutfak_isik
        name: Hızlı Kontrol
        icon: mdi:lightbulb-multiple
  
  # ==========================================
  # VIEW 2: Su Sistemi
  # ==========================================
  - title: Su Sistemi
    icon: mdi:water
    path: su_sistemi
    badges: []
    cards:
      # Su Pompaları Kartı
      - type: entities
        title: 💧 Pompalar
        show_header_toggle: false
        entities:
          - entity: switch.temiz_su_hidrofor
            name: Temiz Su Hidrofor (3.5A)
            icon: mdi:water-pump
          - entity: switch.macerator_pompa
            name: Macerator Pompa (8A)
            icon: mdi:turbine
          - entity: switch.gri_su_pompasi
            name: Gri Su Pompası (5A)
            icon: mdi:water-pump-off
      
      # Su Kontrol Kartı
      - type: entities
        title: 🚰 Su Kontrol
        show_header_toggle: false
        entities:
          - entity: switch.su_pompasi
            name: DI/DO Su Pompası
            icon: mdi:water
          - entity: switch.valf_1
            name: Valf 1
            icon: mdi:valve
          - entity: switch.valf_2
            name: Valf 2
            icon: mdi:valve
      
      # Su Seviyesi (Placeholder - sensör eklenince)
      - type: markdown
        content: |
          ## 📊 Su Seviyeleri
          
          🚰 **Temiz Su:** Sensör bekleniyor...
          
          🚿 **Gri Su:** Sensör bekleniyor...
          
          ---
          *Analog sensör modülü eklendiğinde güncellenecek*
      
      # Güvenlik Uyarıları
      - type: entities
        title: ⚠️ Güvenlik
        show_header_toggle: false
        entities:
          - entity: switch.alarm_siren
            name: Alarm Siren
            icon: mdi:alarm-light
  
  # ==========================================
  # VIEW 3: Mutfak & Cihazlar
  # ==========================================
  - title: Mutfak & Cihazlar
    icon: mdi:fridge
    path: mutfak_cihazlar
    badges: []
    cards:
      # Mutfak Cihazları
      - type: entities
        title: 🍳 Mutfak Cihazları
        show_header_toggle: false
        entities:
          - entity: switch.buzdolabi
            name: Buzdolabı (2.7A)
            icon: mdi:fridge
          - type: divider
          - entity: light.mutfak_isik
            name: Mutfak Işık
          - entity: light.mutfak_tezgah_isik
            name: Tezgâh Işık
      
      # Isıtma & Soğutma
      - type: entities
        title: 🔥 Isıtma & Soğutma
        show_header_toggle: false
        entities:
          - entity: switch.truma_combi_d4
            name: Truma Combi D4 (2A)
            icon: mdi:radiator
          - entity: switch.isitici
            name: Isıtıcı (DI/DO)
            icon: mdi:heating-coil
          - entity: switch.sogutucu
            name: Soğutucu (DI/DO)
            icon: mdi:snowflake
          - entity: switch.havalandirma_fan
            name: Havalandırma Fan
            icon: mdi:fan
      
      # Enerji Durumu (Placeholder)
      - type: markdown
        content: |
          ## ⚡ Enerji Durumu
          
          🔋 **Batarya:** Sensör bekleniyor...
          
          ☀️ **Güneş Paneli:** Sensör bekleniyor...
          
          🔌 **Shore Power:** Sensör bekleniyor...
          
          ---
          *BMS entegrasyonu eklendiğinde güncellenecek*
      
      # Rezerv Kanallar
      - type: entities
        title: 🔧 Rezerv Kanallar
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.rezerv_5
            name: Rezerv 5
          - entity: switch.rezerv_6
            name: Rezerv 6
          - entity: switch.rezerv_7
            name: Rezerv 7
          - entity: switch.rezerv_8
            name: Rezerv 8
          - entity: switch.uyari_lambasi
            name: Uyarı Lambası
            icon: mdi:lightbulb-alert

