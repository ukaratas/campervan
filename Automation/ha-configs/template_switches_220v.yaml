# ==========================================
# Template Switches - 220V Finder Kontaktör Kontrol
# ==========================================
# NOT: Finder 22.22.9.024.4000 kontaktör sistemi ile template switch
# artık zorunlu değildir. DO HIGH = AÇ, DO LOW = KAPA — doğrudan
# switch entity (modbus_combined.yaml) kullanılabilir.
#
# Bu template'ler opsiyonel olarak DI status feedback'ini
# switch durumuna bağlamak için kullanılabilir (donanım doğrulaması).

- platform: template
  switches:
    induksiyon_ocak:
      friendly_name: "İndüksiyon Ocak"
      unique_id: induksiyon_ocak_220v
      value_template: "{{ is_state('binary_sensor.induksiyon_ocak_status', 'on') }}"
      turn_on:
        - service: switch.turn_on
          target:
            entity_id: switch.induksiyon_ocak
      turn_off:
        - service: switch.turn_off
          target:
            entity_id: switch.induksiyon_ocak
      icon_template: >-
        {% if is_state('binary_sensor.induksiyon_ocak_status', 'on') %}
          mdi:stove
        {% else %}
          mdi:stove-off
        {% endif %}
    
    bulasik_makinesi:
      friendly_name: "Bulaşık Makinesi"
      unique_id: bulasik_makinesi_220v
      value_template: "{{ is_state('binary_sensor.bulasik_makinesi_status', 'on') }}"
      turn_on:
        - service: switch.turn_on
          target:
            entity_id: switch.bulasik_makinesi
      turn_off:
        - service: switch.turn_off
          target:
            entity_id: switch.bulasik_makinesi
      icon_template: >-
        {% if is_state('binary_sensor.bulasik_makinesi_status', 'on') %}
          mdi:dishwasher
        {% else %}
          mdi:dishwasher-off
        {% endif %}
    
    camasir_makinesi:
      friendly_name: "Çamaşır Makinesi"
      unique_id: camasir_makinesi_220v
      value_template: "{{ is_state('binary_sensor.camasir_makinesi_status', 'on') }}"
      turn_on:
        - service: switch.turn_on
          target:
            entity_id: switch.camasir_makinesi
      turn_off:
        - service: switch.turn_off
          target:
            entity_id: switch.camasir_makinesi
      icon_template: >-
        {% if is_state('binary_sensor.camasir_makinesi_status', 'on') %}
          mdi:washing-machine
        {% else %}
          mdi:washing-machine-off
        {% endif %}
    
    mikrodalga_firin:
      friendly_name: "Mikrodalga Fırın"
      unique_id: mikrodalga_firin_220v
      value_template: "{{ is_state('binary_sensor.mikrodalga_firin_status', 'on') }}"
      turn_on:
        - service: switch.turn_on
          target:
            entity_id: switch.mikrodalga_firin
      turn_off:
        - service: switch.turn_off
          target:
            entity_id: switch.mikrodalga_firin
      icon_template: >-
        {% if is_state('binary_sensor.mikrodalga_firin_status', 'on') %}
          mdi:microwave
        {% else %}
          mdi:microwave-off
        {% endif %}
