# ==========================================
# Waveshare Latching Relay Instance 02
# Banyo ve Su Sistemi Kontrol
# ==========================================
# Port: 5025
# Slave ID: 1
# 
# NOT: Host olarak .local hostname kullanılıyor (mDNS/Bonjour)
#      Bu sayede Mac'in IP'si değişse bile bağlantı kopmaz.
#      Config dosyasında (config.py) HA_HOSTNAME değişkeninden alınır.
#
# Host: ugurs-macbook-m4-pro.local (dinamik IP'den bağımsız)

modbus:
  - name: "Banyo_Su_Kontrol"
    type: tcp
    host: ugurs-macbook-m4-pro.local  # config.py -> HA_HOSTNAME
    port: 5025                         # config.py -> PORT
    
    lights:
      - name: "Banyo Aydınlatma"
        slave: 1
        address: 0
        write_type: coil
        scan_interval: 1
      
      - name: "Banyo Ayna Aydınlatma"
        slave: 1
        address: 1
        write_type: coil
        scan_interval: 1
    
    switches:
      - name: "Temiz Su Hidrofor"
        slave: 1
        address: 2
        write_type: coil
        scan_interval: 1
      
      - name: "Macerator Pompa"
        slave: 1
        address: 3
        write_type: coil
        scan_interval: 1
      
      - name: "Rezerv 5"
        slave: 1
        address: 4
        write_type: coil
        scan_interval: 1
      
      - name: "Rezerv 6"
        slave: 1
        address: 5
        write_type: coil
        scan_interval: 1
      
      - name: "Rezerv 7"
        slave: 1
        address: 6
        write_type: coil
        scan_interval: 1
      
      - name: "Rezerv 8"
        slave: 1
        address: 7
        write_type: coil
        scan_interval: 1

