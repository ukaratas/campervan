# ==========================================
# Waveshare Modbus RTU IO 8CH - Instance 01
# DI/DO Dijital Giriş/Çıkış Kontrol
# ==========================================
# Port: 5024
# Slave ID: 1
# 
# NOT: Host olarak .local hostname kullanılıyor (mDNS/Bonjour)
#      Bu sayede Mac'in IP'si değişse bile bağlantı kopmaz.
#      Config dosyasında (config.py) HA_HOSTNAME değişkeninden alınır.
#
# Host: ugurs-macbook-m4-pro.local (dinamik IP'den bağımsız)

modbus:
  - name: "DI_DO_Kontrol"
    type: tcp
    host: ugurs-macbook-m4-pro.local  # config.py -> HA_HOSTNAME
    port: 5024                         # config.py -> PORT
    
    # ==========================================
    # DIGITAL INPUTS (Push Buttons)
    # ==========================================
    binary_sensors:
      - name: "Sağ Yatak Butonu"
        slave: 1
        address: 0
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Sol Yatak Butonu"
        slave: 1
        address: 1
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Popup Yatak Butonu"
        slave: 1
        address: 2
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Dış Aydınlatma Butonu"
        slave: 1
        address: 3
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Otomatik Basamak Butonu"
        slave: 1
        address: 4
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Mutfak Butonu"
        slave: 1
        address: 5
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Orta Alan Butonu"
        slave: 1
        address: 6
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Banyo Butonu"
        slave: 1
        address: 7
        input_type: discrete_input
        scan_interval: 1
    
    # ==========================================
    # DIGITAL OUTPUTS (Switches)
    # ==========================================
    switches:
      - name: "Alarm Siren"
        slave: 1
        address: 0
        write_type: coil
        scan_interval: 1
      
      - name: "Havalandırma Fan"
        slave: 1
        address: 1
        write_type: coil
        scan_interval: 1
      
      - name: "Su Pompası"
        slave: 1
        address: 2
        write_type: coil
        scan_interval: 1
      
      - name: "Isıtıcı"
        slave: 1
        address: 3
        write_type: coil
        scan_interval: 1
      
      - name: "Soğutucu"
        slave: 1
        address: 4
        write_type: coil
        scan_interval: 1
      
      - name: "Valf 1"
        slave: 1
        address: 5
        write_type: coil
        scan_interval: 1
      
      - name: "Valf 2"
        slave: 1
        address: 6
        write_type: coil
        scan_interval: 1
      
      - name: "Uyarı Lambası"
        slave: 1
        address: 7
        write_type: coil
        scan_interval: 1

