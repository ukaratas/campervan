# ==========================================
# HOME ASSISTANT - WAVESHARE MODBUS CONFIG
# ==========================================
# Mac IP: 192.168.1.45
# Simülatörler:
#   - Latching Relay: Port 5023
#   - DI/DO Module: Port 5022 (henüz başlatılmadı)

# Bu konfigürasyonu Home Assistant configuration.yaml'a EKLE
# (Önceki modbus: kısmını SİL!)

modbus:
  # ==========================================
  # Waveshare Latching Relay Module #1
  # Port: 5023 - Aydınlatma Kontrol
  # ==========================================
  - name: "Lighting_Control"
    type: tcp
    host: 192.168.1.45
    port: 5023
    
    # 8 Kanal Latching Relay (Coil hem READ hem WRITE)
    lights:
      - name: "Mutfak Işık"
        slave: 1
        address: 0
        write_type: coil
        scan_interval: 1
      
      - name: "Mutfak Tezgâh Işık"
        slave: 1
        address: 1
        write_type: coil
        scan_interval: 1
      
      - name: "Orta Alan Işık"
        slave: 1
        address: 2
        write_type: coil
        scan_interval: 1
      
      - name: "Yatak Alanı Işık"
        slave: 1
        address: 3
        write_type: coil
        scan_interval: 1
      
      - name: "Popup Yatak Işık"
        slave: 1
        address: 4
        write_type: coil
        scan_interval: 1
      
      - name: "Sol Okuma Işık"
        slave: 1
        address: 5
        write_type: coil
        scan_interval: 1
      
      - name: "Sağ Okuma Işık"
        slave: 1
        address: 6
        write_type: coil
        scan_interval: 1
      
      - name: "Tente Işık"
        slave: 1
        address: 7
        write_type: coil
        scan_interval: 1

# ==========================================
# ADIMLAR
# ==========================================
# 1. Home Assistant File Editor'ü aç
# 2. configuration.yaml'daki ESKİ modbus: kısmını SİL
# 3. Yukarıdaki konfigürasyonu EKLE
# 4. Save
# 5. Developer Tools → YAML → Check Configuration ✓
# 6. Settings → System → Restart
# 7. Restart sonrası Overview'da 8 ışık göreceksin!

