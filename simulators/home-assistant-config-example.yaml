# Home Assistant Configuration.yaml - Modbus Simülatör Entegrasyonu
# Bu dosyayı Home Assistant configuration.yaml dosyanıza ekleyin

# NOT: <HOST_IP> yerine Mac'inizin IP adresini yazın
# UTM network bridge mode kullanıyorsanız Mac'in local IP'si (örn: 192.168.1.100)

modbus:
  # ==========================================
  # DI/DO Module - Push Buttons ve High Power Control
  # ==========================================
  - name: "DI_DO_Module"
    type: tcp
    host: <HOST_IP>  # Örnek: 192.168.1.100
    port: 5022
    
    # Push Button Girişleri (Discrete Inputs)
    binary_sensors:
      - name: "Sağ Yatak Button"
        slave: 1
        address: 0
        input_type: discrete_input
        device_class: occupancy
        
      - name: "Sol Yatak Button"
        slave: 1
        address: 1
        input_type: discrete_input
        device_class: occupancy
        
      - name: "Popup Yatak Button"
        slave: 1
        address: 2
        input_type: discrete_input
        device_class: occupancy
        
      - name: "Dış Aydınlatma Button"
        slave: 1
        address: 3
        input_type: discrete_input
        device_class: occupancy
        
      - name: "Basamak Button"
        slave: 1
        address: 4
        input_type: discrete_input
        device_class: occupancy
        
      - name: "Mutfak Button"
        slave: 1
        address: 5
        input_type: discrete_input
        device_class: occupancy
        
      - name: "Orta Alan Button"
        slave: 1
        address: 6
        input_type: discrete_input
        device_class: occupancy
        
      - name: "Banyo Button"
        slave: 1
        address: 7
        input_type: discrete_input
        device_class: occupancy
    
    # Bistable Relay Tetikleme (Coils - DO Çıkışları)
    switches:
      - name: "Buzdolabı"
        slave: 1
        address: 0
        write_type: coil
        
      - name: "Hidrofor"
        slave: 1
        address: 1
        write_type: coil
        
      - name: "24V Klima"
        slave: 1
        address: 2
        write_type: coil
        
      - name: "Truma Combi"
        slave: 1
        address: 3
        write_type: coil
        
      - name: "USB Şarj"
        slave: 1
        address: 4
        write_type: coil
        
      - name: "24V Çıkışlar"
        slave: 1
        address: 5
        write_type: coil
        
      - name: "12V Çıkışlar"
        slave: 1
        address: 6
        write_type: coil

  # ==========================================
  # Low Latching Relay - Aydınlatma Kontrol
  # ==========================================
  - name: "Lighting_Control"
    type: tcp
    host: <HOST_IP>
    port: 5023
    
    # Aydınlatma Röleleri (Coils)
    lights:
      - name: "Mutfak Işık"
        slave: 1
        address: 0
        write_type: coil
        
      - name: "Mutfak Tezgâh Işık"
        slave: 1
        address: 1
        write_type: coil
        
      - name: "Orta Alan Işık"
        slave: 1
        address: 2
        write_type: coil
        
      - name: "Yatak Alanı Işık"
        slave: 1
        address: 3
        write_type: coil
        
      - name: "Popup Yatak Işık"
        slave: 1
        address: 4
        write_type: coil
        
      - name: "Sol Okuma Işık"
        slave: 1
        address: 5
        write_type: coil
        
      - name: "Sağ Okuma Işık"
        slave: 1
        address: 6
        write_type: coil
        
      - name: "Tente Işık"
        slave: 1
        address: 7
        write_type: coil
    
    # LED Güç Tüketimi (Input Registers)
    sensors:
      - name: "Mutfak Işık Güç"
        slave: 1
        address: 0
        input_type: input
        data_type: uint16
        unit_of_measurement: "W"
        device_class: power
        
      - name: "Toplam Aydınlatma Gücü"
        slave: 1
        address: 100
        input_type: input
        data_type: uint16
        unit_of_measurement: "W"
        device_class: power

  # ==========================================
  # Analog Module - Su Tank Sensörleri
  # ==========================================
  - name: "Water_Tanks"
    type: tcp
    host: <HOST_IP>
    port: 5024
    
    sensors:
      # Temiz Su
      - name: "Temiz Su Seviyesi"
        slave: 1
        address: 0
        input_type: input
        data_type: uint16
        scale: 0.1
        precision: 1
        unit_of_measurement: "%"
        state_class: measurement
        
      - name: "Temiz Su Hacim"
        slave: 1
        address: 100
        input_type: input
        data_type: uint16
        unit_of_measurement: "L"
        device_class: water
        state_class: measurement
        
      # Gri Su
      - name: "Gri Su Seviyesi"
        slave: 1
        address: 1
        input_type: input
        data_type: uint16
        scale: 0.1
        precision: 1
        unit_of_measurement: "%"
        state_class: measurement
        
      - name: "Gri Su Hacim"
        slave: 1
        address: 101
        input_type: input
        data_type: uint16
        unit_of_measurement: "L"
        device_class: water
        state_class: measurement

# ==========================================
# Helper Entities (Simülasyon için ekstra)
# ==========================================
input_boolean:
  shore_power_connected:
    name: Shore Power Bağlı
    icon: mdi:power-plug
    initial: off

input_number:
  battery_soc:
    name: Batarya SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery
    initial: 75

# ==========================================
# Automation Examples
# ==========================================
automation:
  # Push Button → Light Control
  - alias: "Sağ Yatak Button - Yatak Alanı Işık"
    trigger:
      - platform: state
        entity_id: binary_sensor.sag_yatak_button
        to: 'on'
    action:
      - service: light.toggle
        target:
          entity_id: light.yatak_alani_isik
  
  # Düşük Su Uyarısı
  - alias: "Düşük Temiz Su Uyarısı"
    trigger:
      - platform: numeric_state
        entity_id: sensor.temiz_su_seviyesi
        below: 20
    action:
      - service: notify.persistent_notification
        data:
          message: "⚠️ Temiz su seviyesi {{ states('sensor.temiz_su_seviyesi') }}%"
          title: "Düşük Su Uyarısı"
  
  # Yüksek Gri Su Uyarısı
  - alias: "Yüksek Gri Su Uyarısı"
    trigger:
      - platform: numeric_state
        entity_id: sensor.gri_su_seviyesi
        above: 80
    action:
      - service: notify.persistent_notification
        data:
          message: "⚠️ Gri su tankı {{ states('sensor.gri_su_seviyesi') }}% dolu"
          title: "Gri Su Boşaltma Gerekli"
  
  # Tüm Işıkları Kapat (Orta Alan Button Double Press Simülasyonu)
  - alias: "Orta Alan Button - Tüm Işıkları Kapat"
    trigger:
      - platform: state
        entity_id: binary_sensor.orta_alan_button
        to: 'on'
    action:
      - service: light.turn_off
        target:
          entity_id:
            - light.mutfak_isik
            - light.mutfak_tezgah_isik
            - light.orta_alan_isik
            - light.yatak_alani_isik
            - light.popup_yatak_isik
            - light.sol_okuma_isik
            - light.sag_okuma_isik
            - light.tente_isik

