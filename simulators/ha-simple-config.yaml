# ==========================================
# HOME ASSISTANT SIMPLE CONFIG
# 1 Button + 1 Light için minimal konfigürasyon
# ==========================================

# NOT: <MAC_IP> yerine Mac'inizin IP adresini yazın
# Örnek: 192.168.1.100

modbus:
  - name: "Simple_Test"
    type: tcp
    host: <MAC_IP>  # ÖNEMLİ: Buraya Mac IP'nizi yazın!
    port: 5020
    
    # Push Button (Discrete Input)
    binary_sensors:
      - name: "Sağ Yatak Button"
        slave: 1
        address: 0
        input_type: discrete_input
        device_class: occupancy
        scan_interval: 1  # Her saniye kontrol et
    
    # Yatak Alanı Işık (Coil)
    lights:
      - name: "Yatak Alanı Işık"
        slave: 1
        address: 0
        write_type: coil

# ==========================================
# Basit Otomasyon - Button Toggle Light
# ==========================================
automation:
  - alias: "Test - Sağ Yatak Button Toggle"
    description: "Sağ yatak button basınca yatak ışığını aç/kapa"
    trigger:
      - platform: state
        entity_id: binary_sensor.sag_yatak_button
        to: 'on'
    action:
      - service: light.toggle
        target:
          entity_id: light.yatak_alani_isik

