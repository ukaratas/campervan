# ==========================================
# Waveshare Latching Relay Instance 03
# Yüksek Tüketim Cihazları Kontrol
# ==========================================
# Port: 5026
# Slave ID: 1
# 
# NOT: Host olarak .local hostname kullanılıyor (mDNS/Bonjour)
#      Bu sayede Mac'in IP'si değişse bile bağlantı kopmaz.
#      Config dosyasında (config.py) HA_HOSTNAME değişkeninden alınır.
#
# Host: ugurs-macbook-m4-pro.local (dinamik IP'den bağımsız)

modbus:
  - name: "Yuksek_Tuketim_Kontrol"
    type: tcp
    host: ugurs-macbook-m4-pro.local  # config.py -> HA_HOSTNAME
    port: 5026                         # config.py -> PORT
    
    switches:
      - name: "Buzdolabı"
        slave: 1
        address: 0
        write_type: coil
        scan_interval: 1
      
      - name: "USB Kutusu Mutfak"
        slave: 1
        address: 1
        write_type: coil
        scan_interval: 1
      
      - name: "USB Kutusu Yatak"
        slave: 1
        address: 2
        write_type: coil
        scan_interval: 1
      
      - name: "USB Kutusu Banyo"
        slave: 1
        address: 3
        write_type: coil
        scan_interval: 1
      
      - name: "USB Kutusu Popup"
        slave: 1
        address: 4
        write_type: coil
        scan_interval: 1
      
      - name: "Truma Combi D4"
        slave: 1
        address: 5
        write_type: coil
        scan_interval: 1
      
      - name: "Gri Su Pompası"
        slave: 1
        address: 6
        write_type: coil
        scan_interval: 1
      
      - name: "Rezerv 8"
        slave: 1
        address: 7
        write_type: coil
        scan_interval: 1

