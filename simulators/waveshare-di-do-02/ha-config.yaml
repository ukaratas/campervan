# ==========================================
# Waveshare Modbus RTU IO 8CH - Instance 02
# 220V Finder Kontaktör Kontrol Sistemi
# ==========================================
# Port: 5027
# Slave ID: 1
# 
# NOT: Host olarak .local hostname kullanılıyor (mDNS/Bonjour)
#      Bu sayede Mac'in IP'si değişse bile bağlantı kopmaz.
#      Config dosyasında (config.py) HA_HOSTNAME değişkeninden alınır.
#
# Host: ugurs-macbook-m4-pro.local (dinamik IP'den bağımsız)
#
# Finder 22.22.9.024.4000 Kontaktör Sistemi:
# - Her kontaktör 1 DO kullanır: HIGH=AÇ, LOW=KAPA (sürekli, pulse değil)
# - Her kontaktör 1 DI kullanır: STATUS (Yardımcı kontak geri bildirimi)
# - 8 DO ile 8 kontaktör kontrol edilebilir (şu an 5 kullanılıyor)

modbus:
  - name: "Finder_220V_Kontrol"
    type: tcp
    host: ugurs-macbook-m4-pro.local  # config.py -> HA_HOSTNAME
    port: 5027                         # config.py -> PORT
    
    # ==========================================
    # DIGITAL INPUTS (Kontaktör Status Feedback)
    # ==========================================
    binary_sensors:
      - name: "İndüksiyon Ocak Status"
        unique_id: finder_220v_di_0
        slave: 1
        address: 0
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Bulaşık Makinesi Status"
        unique_id: finder_220v_di_1
        slave: 1
        address: 1
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Çamaşır Makinesi Status"
        unique_id: finder_220v_di_2
        slave: 1
        address: 2
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Mikrodalga Fırın Status"
        unique_id: finder_220v_di_3
        slave: 1
        address: 3
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Finder-5 Rezerv Status"
        unique_id: finder_220v_di_4
        slave: 1
        address: 4
        input_type: discrete_input
        scan_interval: 1
    
    # ==========================================
    # DIGITAL OUTPUTS (Kontaktör Bobin Kontrol)
    # ==========================================
    # DO HIGH = Kontaktör çeker (cihaz AÇ)
    # DO LOW  = Kontaktör düşer (cihaz KAPA)
    switches:
      - name: "İndüksiyon Ocak"
        unique_id: finder_220v_do_0
        slave: 1
        address: 0
        write_type: coil
        scan_interval: 1
      
      - name: "Bulaşık Makinesi"
        unique_id: finder_220v_do_1
        slave: 1
        address: 1
        write_type: coil
        scan_interval: 1
      
      - name: "Çamaşır Makinesi"
        unique_id: finder_220v_do_2
        slave: 1
        address: 2
        write_type: coil
        scan_interval: 1
      
      - name: "Mikrodalga Fırın"
        unique_id: finder_220v_do_3
        slave: 1
        address: 3
        write_type: coil
        scan_interval: 1
      
      - name: "Finder-5 Rezerv"
        unique_id: finder_220v_do_4
        slave: 1
        address: 4
        write_type: coil
        scan_interval: 1

# ==========================================
# NOT: Template switch artık gerekli değil!
# ==========================================
# Kontaktör sistemi ile DO durumu = cihaz durumu.
# DO HIGH = AÇ, DO LOW = KAPA — doğrudan switch entity kullanılır.
# Eski impulse relay sistemindeki SET/RESET pulse + template switch
# karmaşıklığı ortadan kalkmıştır.
#
# Binary sensor'lar (DI) donanım seviyesinde durum doğrulaması için
# kullanılır (kontaktör gerçekten çekti mi?).
