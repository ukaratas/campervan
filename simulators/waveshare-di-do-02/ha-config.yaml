# ==========================================
# Waveshare Modbus RTU IO 8CH - Instance 02
# 220V Finder Röle Kontrol Sistemi
# ==========================================
# Port: 5027
# Slave ID: 1
# 
# NOT: Host olarak .local hostname kullanılıyor (mDNS/Bonjour)
#      Bu sayede Mac'in IP'si değişse bile bağlantı kopmaz.
#      Config dosyasında (config.py) HA_HOSTNAME değişkeninden alınır.
#
# Host: ugurs-macbook-m4-pro.local (dinamik IP'den bağımsız)
#
# Finder 20.22.0.024.0000 Röle Sistemi:
# - Her Finder röle 2 DO kullanır: SET (AÇ) ve RESET (KAPA)
# - Her Finder röle 1 DI kullanır: STATUS (Geri bildirim)
# - 8 DO ile 4 Finder kontrol edilebilir

modbus:
  - name: "Finder_220V_Kontrol"
    type: tcp
    host: ugurs-macbook-m4-pro.local  # config.py -> HA_HOSTNAME
    port: 5027                         # config.py -> PORT
    
    # ==========================================
    # DIGITAL INPUTS (Finder Status Feedback)
    # ==========================================
    binary_sensors:
      - name: "İndüksiyon Ocak Status"
        unique_id: finder_220v_di_0
        slave: 1
        address: 0
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Bulaşık Makinesi Status"
        unique_id: finder_220v_di_1
        slave: 1
        address: 1
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Çamaşır Makinesi Status"
        unique_id: finder_220v_di_2
        slave: 1
        address: 2
        input_type: discrete_input
        scan_interval: 1
      
      - name: "Finder-4 Status"
        unique_id: finder_220v_di_3
        slave: 1
        address: 3
        input_type: discrete_input
        scan_interval: 1
    
    # ==========================================
    # DIGITAL OUTPUTS (Finder SET/RESET)
    # ==========================================
    # Her Finder için 2 switch gerekir
    switches:
      # Finder-1: İndüksiyon Ocak
      - name: "İndüksiyon Ocak SET"
        unique_id: finder_220v_do_0
        slave: 1
        address: 0
        write_type: coil
        scan_interval: 1
      
      - name: "İndüksiyon Ocak RESET"
        unique_id: finder_220v_do_1
        slave: 1
        address: 1
        write_type: coil
        scan_interval: 1
      
      # Finder-2: Bulaşık Makinesi
      - name: "Bulaşık Makinesi SET"
        unique_id: finder_220v_do_2
        slave: 1
        address: 2
        write_type: coil
        scan_interval: 1
      
      - name: "Bulaşık Makinesi RESET"
        unique_id: finder_220v_do_3
        slave: 1
        address: 3
        write_type: coil
        scan_interval: 1
      
      # Finder-3: Çamaşır Makinesi
      - name: "Çamaşır Makinesi SET"
        unique_id: finder_220v_do_4
        slave: 1
        address: 4
        write_type: coil
        scan_interval: 1
      
      - name: "Çamaşır Makinesi RESET"
        unique_id: finder_220v_do_5
        slave: 1
        address: 5
        write_type: coil
        scan_interval: 1
      
      # Finder-4: Rezerv
      - name: "Finder-4 SET"
        unique_id: finder_220v_do_6
        slave: 1
        address: 6
        write_type: coil
        scan_interval: 1
      
      - name: "Finder-4 RESET"
        unique_id: finder_220v_do_7
        slave: 1
        address: 7
        write_type: coil
        scan_interval: 1

# ==========================================
# TEMPLATE SWITCHES (Kullanıcı Dostu)
# ==========================================
# Finder rölelerini tek bir switch ile kontrol etmek için
# Bu bölümü configuration.yaml içine ekleyin

switch:
  - platform: template
    switches:
      induksiyon_ocak:
        friendly_name: "İndüksiyon Ocak"
        unique_id: induksiyon_ocak_220v
        value_template: "{{ is_state('binary_sensor.induksiyon_ocak_status', 'on') }}"
        turn_on:
          - service: switch.turn_on
            target:
              entity_id: switch.induksiyon_ocak_set
          - delay:
              milliseconds: 100
          - service: switch.turn_off
            target:
              entity_id: switch.induksiyon_ocak_set
        turn_off:
          - service: switch.turn_on
            target:
              entity_id: switch.induksiyon_ocak_reset
          - delay:
              milliseconds: 100
          - service: switch.turn_off
            target:
              entity_id: switch.induksiyon_ocak_reset
        icon_template: >-
          {% if is_state('binary_sensor.induksiyon_ocak_status', 'on') %}
            mdi:stove
          {% else %}
            mdi:stove-off
          {% endif %}
      
      bulasik_makinesi:
        friendly_name: "Bulaşık Makinesi"
        unique_id: bulasik_makinesi_220v
        value_template: "{{ is_state('binary_sensor.bulasik_makinesi_status', 'on') }}"
        turn_on:
          - service: switch.turn_on
            target:
              entity_id: switch.bulasik_makinesi_set
          - delay:
              milliseconds: 100
          - service: switch.turn_off
            target:
              entity_id: switch.bulasik_makinesi_set
        turn_off:
          - service: switch.turn_on
            target:
              entity_id: switch.bulasik_makinesi_reset
          - delay:
              milliseconds: 100
          - service: switch.turn_off
            target:
              entity_id: switch.bulasik_makinesi_reset
        icon_template: >-
          {% if is_state('binary_sensor.bulasik_makinesi_status', 'on') %}
            mdi:dishwasher
          {% else %}
            mdi:dishwasher-off
          {% endif %}
      
      camasir_makinesi:
        friendly_name: "Çamaşır Makinesi"
        unique_id: camasir_makinesi_220v
        value_template: "{{ is_state('binary_sensor.camasir_makinesi_status', 'on') }}"
        turn_on:
          - service: switch.turn_on
            target:
              entity_id: switch.camasir_makinesi_set
          - delay:
              milliseconds: 100
          - service: switch.turn_off
            target:
              entity_id: switch.camasir_makinesi_set
        turn_off:
          - service: switch.turn_on
            target:
              entity_id: switch.camasir_makinesi_reset
          - delay:
              milliseconds: 100
          - service: switch.turn_off
            target:
              entity_id: switch.camasir_makinesi_reset
        icon_template: >-
          {% if is_state('binary_sensor.camasir_makinesi_status', 'on') %}
            mdi:washing-machine
          {% else %}
            mdi:washing-machine-off
          {% endif %}


