        {% set e = 'sensor.bsc_ip65_12_15_hq2349fuajv_output_phase_2_voltage' %}
        {{ iif(states(e) | is_number, states(e) | float(0), 0) }}
    - name: "Victron gauge L2 current"
      unique_id: victron_gauge_l2_current
      unit_of_measurement: "A"
      state_class: measurement
      device_class: current
      state: >-
        {% set e = 'sensor.bsc_ip65_12_15_hq2349fuajv_output_phase_2_current' %}
        {{ iif(states(e) | is_number, states(e) | float(0), 0) }}
    - name: "Victron gauge L3 voltage"
      unique_id: victron_gauge_l3_voltage
