# Waveshare Modbus RTU IO 8CH — open-drain outputs (coils)
# FC05: Waveshare 0xFF00=ON, 0x0000=OFF (1/0 bazı cihazlarda isError verir)
- name: "DO1 — Warning Light"
  unique_id: rs485_io8_do1
  address: 0
  slave: 1
  write_type: coil
  command_on: 0xFF00
  command_off: 0x0000
  scan_interval: 25
- name: "DO2 — Error Buzzer"
  unique_id: rs485_io8_do2
  address: 1
  slave: 1
  write_type: coil
  command_on: 0xFF00
  command_off: 0x0000
  scan_interval: 25
