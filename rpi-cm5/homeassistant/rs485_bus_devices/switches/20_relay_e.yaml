# Waveshare Modbus RTU Relay (E) — 8× 32 A, coils 0–7
# FC05: coil ON=0xFF00, OFF=0x0000 (Waveshare / Modbus standart)
- name: "CH1 — 220V Outlets"
  unique_id: rs485_rtu_e_ch1_220v_outlets
  address: 0
  slave: 2
  write_type: coil
  command_on: 0xFF00
  command_off: 0x0000
  scan_interval: 15
- name: "CH2 — Clesana C1"
  unique_id: rs485_rtu_e_ch2_clesana_c1
  address: 1
  slave: 2
  write_type: coil
