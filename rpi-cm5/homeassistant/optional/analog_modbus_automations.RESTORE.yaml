# Bu dosya configuration.yaml tarafından YÜKLENMEZ.
# HA 2026.4.x "ha core check" tetikleyici doğrulama hatası giderildiğinde içeriği
# automations.yaml ile birleştirin veya Ayarlar → Otomasyonlar → YAML modundan yapıştırın.
#
# 8 ayrı otomasyon (kanal başına tek entity_id)

- id: analog_modbus_mode_ch1
  alias: Analog CH1 mode — write Modbus holding
  trigger:
    - platform: state
      entity_id: input_select.ai_ch1_modbus_mode
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.state not in ['unavailable', 'unknown', none] and trigger.to_state.state | length > 0 }}"
  action:
    - service: modbus.write_register
      data:
        hub: rs485_bus
        slave: 3
        address: 4096
        value: "{{ trigger.to_state.state[0] | int }}"
